<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virola v10</title>
<style>
  :root {
    --bg: #0D0F12;
    --bg2: #151820;
    --bg3: #1C2030;
    --border: #2A2F3E;
    --text: #E8EAF0;
    --muted: #6B7390;
    --accent: #00C896;
    --accent2: #0099FF;
    --warn: #FF6B4A;
    --purple: #A78BFA;
    --green: #00ff00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .kill-btn {
    width: 100%; padding: 8px 12px;
    background: var(--warn); color: #fff; border: none; border-radius: 6px;
    font-size: 13px; font-weight: 600; cursor: pointer; letter-spacing: 0.3px;
    transition: opacity 0.15s;
  }
  .kill-btn:hover { opacity: 0.85; }
  .kill-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  body {
    width: 340px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    overflow: hidden;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }

  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-text { font-size: 15px; font-weight: 600; }
  .logo-sub { font-size: 10px; color: var(--muted); }

  .status-pill {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px;
    font-size: 10px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .status-pill.connected {
    background: rgba(0, 200, 150, 0.12);
    border: 1px solid rgba(0, 200, 150, 0.3);
    color: var(--accent);
  }
  .status-pill.disconnected {
    background: rgba(255, 107, 74, 0.12);
    border: 1px solid rgba(255, 107, 74, 0.3);
    color: var(--warn);
  }
  .status-pill.streaming {
    background: rgba(0, 255, 0, 0.12);
    border: 1px solid rgba(0, 255, 0, 0.3);
    color: var(--green);
    animation: pulse 1s infinite;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .status-pill.disconnected .status-dot { animation: none; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .section-label {
    font-size: 9px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 10px;
  }

  .port-row { display: flex; align-items: center; gap: 8px; }
  .port-label { font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .port-input {
    flex: 1; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 12px;
    padding: 6px 10px; outline: none;
  }
  .port-input:focus { border-color: var(--accent2); }
  .connect-btn {
    padding: 6px 12px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 10px;
    font-weight: 500; text-transform: uppercase; cursor: pointer;
    transition: all 0.2s; flex-shrink: 0;
  }
  .connect-btn:hover { background: var(--border); border-color: var(--accent2); color: var(--accent2); }

  .toggle-row {
    display: flex; align-items: center; justify-content: space-between; padding: 4px 0;
  }
  .toggle-label { display: flex; flex-direction: column; gap: 2px; }
  .toggle-label span:first-child { font-size: 12px; font-weight: 500; }
  .toggle-label span:last-child { font-size: 10px; color: var(--muted); }
  .toggle { position: relative; width: 36px; height: 20px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 20px; cursor: pointer;
    transition: all 0.2s;
  }
  .toggle-track::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 14px; height: 14px; background: var(--muted); border-radius: 50%;
    transition: all 0.2s;
  }
  .toggle input:checked + .toggle-track {
    background: rgba(0, 200, 150, 0.15); border-color: var(--accent);
  }
  .toggle input:checked + .toggle-track::after { left: 18px; background: var(--accent); }

  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .stat-card {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px; text-align: center;
  }
  .stat-value { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .stat-value.success { color: var(--accent); }
  .stat-value.failed { color: var(--warn); }
  .stat-name { font-size: 9px; color: var(--muted); text-transform: uppercase; }

  .sys-prompt-btn {
    width: 100%; padding: 10px;
    background: linear-gradient(135deg, rgba(0, 200, 150, 0.15), rgba(0, 153, 255, 0.15));
    border: 1px solid rgba(0, 200, 150, 0.4); border-radius: 8px;
    color: var(--accent); font-size: 11px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .sys-prompt-btn:hover { background: linear-gradient(135deg, rgba(0, 200, 150, 0.25), rgba(0, 153, 255, 0.25)); border-color: var(--accent); }
  .sys-prompt-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .sys-prompt-status { font-size: 11px; margin-top: 8px; text-align: center; display: block; }
  .sys-prompt-status.success { color: var(--accent); }
  .sys-prompt-status.failed { color: var(--warn); }

  .stream-status {
    font-size: 11px; padding: 4px 8px; border-radius: 4px;
    background: var(--bg3); margin-top: 10px; text-align: center;
  }
  .stream-status.active { background: rgba(0, 255, 0, 0.1); color: var(--green); }

  .log-container {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; height: 120px; overflow-y: auto;
    font-family: 'Monaco', 'Consolas', monospace; font-size: 10px;
    padding: 8px;
  }
  .log-line {
    display: flex; gap: 6px; padding: 2px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03); line-height: 1.5;
  }
  .log-time { color: var(--muted); flex-shrink: 0; }
  .log-source { color: var(--purple); flex-shrink: 0; }
  .log-action { color: var(--accent2); flex-shrink: 0; }
  .log-detail { color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .log-line.error .log-detail { color: var(--warn); }
  .log-line.success .log-action { color: var(--accent); }
  .log-empty { color: var(--muted); text-align: center; padding: 36px 0; font-size: 11px; }

  .footer {
    padding: 10px 16px; display: flex; align-items: center;
    justify-content: space-between;
  }
  .footer-link { font-size: 10px; color: var(--muted); text-decoration: none; cursor: pointer; }
  .footer-link:hover { color: var(--text); }

  .offline-hint {
    background: rgba(255, 107, 74, 0.07); border: 1px solid rgba(255, 107, 74, 0.2);
    border-radius: 8px; padding: 10px 12px; font-size: 11px; color: var(--warn); line-height: 1.6;
  }
  .offline-hint code {
    background: rgba(255, 107, 74, 0.15); padding: 1px 5px;
    border-radius: 3px; font-family: monospace; font-size: 10px;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">Virola</div>
      <div class="logo-sub">Real-time Streaming</div>
    </div>
  </div>
  <div class="status-pill disconnected" id="statusPill">
    <div class="status-dot"></div>
    <span id="statusText">Offline</span>
  </div>
</div>

<div class="section">
  <div class="section-label">Bridge Endpoint</div>
  <div class="port-row">
    <span class="port-label">localhost:</span>
    <input class="port-input" type="number" id="portInput" value="3172" min="1024" max="65535">
    <button class="connect-btn" id="connectBtn">Ping</button>
  </div>
  <div id="offlineHint" class="offline-hint" style="margin-top:10px;">
    Start the server:<br>
    <code>node server.js</code>
  </div>
</div>

<div class="section">
  <div class="section-label">System Prompt</div>
  <button class="sys-prompt-btn" id="injectSysPromptBtn">
    Inject Virola Prompt
  </button>
  <span class="sys-prompt-status" id="sysPromptStatus"></span>
</div>

<div class="section">
  <div class="section-label">Options</div>
  <div class="toggle-row">
    <div class="toggle-label">
      <span>Auto-approve</span>
      <span>Execute without confirmation</span>
    </div>
    <label class="toggle">
      <input type="checkbox" id="autoApprove">
      <div class="toggle-track"></div>
    </label>
  </div>
</div>

<div class="section">
  <div class="section-label">Session Stats</div>
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value" id="statDispatched">0</div>
      <div class="stat-name">Dispatched</div>
    </div>
    <div class="stat-card">
      <div class="stat-value success" id="statSuccess">0</div>
      <div class="stat-name">Success</div>
    </div>
    <div class="stat-card">
      <div class="stat-value failed" id="statFailed">0</div>
      <div class="stat-name">Failed</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statChunks">0</div>
      <div class="stat-name">Chunks</div>
    </div>
  </div>
  <div id="streamStatus" class="stream-status">Idle</div>
</div>

<div class="section" id="bgProcessSection">
  <div class="section-label">Background Processes</div>
  <div id="bgProcessList" style="margin-bottom:8px; font-size:12px; color:var(--muted);"></div>
  <button class="kill-btn" id="killLastBtn">⏹ Kill Latest Server</button>
  <div id="killStatus" style="font-size:11px; margin-top:6px; min-height:14px;"></div>
</div>

<div class="section" style="border-bottom: none;">
  <div class="section-label">Activity</div>
  <div class="log-container" id="logContainer">
    <div class="log-empty" id="logEmpty">Waiting for AI tool calls…</div>
  </div>
</div>

<div class="footer">
  <span class="footer-link" id="clearLog">Clear log</span>
  <span class="footer-link" id="openDocs">Docs</span>
</div>

<script src="popup.js"></script>
</body>
</html>
